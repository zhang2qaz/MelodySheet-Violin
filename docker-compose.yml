services:
  api:
    build:
      context: ./apps/api
    environment:
      MELODYSHEET_STORAGE_PATH: /app/storage
      MELODYSHEET_CORS_ORIGINS: http://localhost:3000
    ports:
      - "8000:8000"
    volumes:
      - ./storage:/app/storage

  web:
    build:
      context: ./apps/web
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - api
