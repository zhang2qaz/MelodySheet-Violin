name: Build Windows installer

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      release:
        description: "Attach the .exe to a draft GitHub Release"
        required: false
        default: "false"

permissions:
  contents: write  # required for softprops/action-gh-release to create releases

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          architecture: x64

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) { throw "ISCC.exe missing after install" }
          echo "ISCC_PATH=$iscc" >> $env:GITHUB_ENV

      # The .ps1 must stay pure ASCII. Windows PowerShell 5.1 reads files
      # under the system code page when there's no BOM, and any multi-byte
      # UTF-8 sequence (em-dash, Chinese, etc) gets mangled, which corrupts
      # string-literal boundaries and triggers cryptic parser errors deep
      # in the file (e.g. "Unexpected token 'MB'" 80+ lines past the actual
      # bad char). This has bitten us THREE times. Fail fast here so we
      # know immediately rather than after the runner spends 30s booting.
      - name: Guard build.ps1 is pure ASCII
        shell: bash
        run: |
          set -e
          if LC_ALL=C grep -qP '[^\x00-\x7f]' installer/build.ps1; then
            echo "::error file=installer/build.ps1::build.ps1 contains non-ASCII chars. Windows PowerShell 5.1 will mangle the file and parser will fail downstream."
            LC_ALL=C grep -nP '[^\x00-\x7f]' installer/build.ps1
            exit 1
          fi
          echo "build.ps1 is pure ASCII -- OK"

      - name: Run build pipeline
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File installer\build.ps1 -IsccPath "$env:ISCC_PATH"

      - name: Verify installer exists
        shell: pwsh
        run: |
          $exe = "installer\out\MelodySheet-Setup.exe"
          if (-not (Test-Path $exe)) { throw "Installer not produced at $exe" }
          Get-Item $exe | Format-List FullName, Length, LastWriteTime

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MelodySheet-Setup
          path: installer/out/MelodySheet-Setup.exe
          if-no-files-found: error
          retention-days: 30

      - name: Publish to GitHub Release
        # Always publish on tag push (so china users can use ghproxy mirror).
        # Manual dispatch still respects the `release` input.
        if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && github.event.inputs.release == 'true')
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          files: installer/out/MelodySheet-Setup.exe
          name: MelodySheet ${{ github.ref_name }} (Windows)
          tag_name: ${{ github.ref_name }}
          body: |
            ## 小提琴旋律谱 · Windows 安装包

            下载 `MelodySheet-Setup.exe` 双击安装。应用本地运行在
            `http://127.0.0.1:8765/`,首次启动会自动开浏览器。

            ### 国内下载加速

            如果你在中国大陆，直连 GitHub 速度慢，可以加 ghproxy 镜像前缀：
            `https://ghproxy.com/<原下载链接>`

            ### 卡死 / 启动崩溃？
            从 CMD 跑 `MelodySheet.exe`，或者打开
            `%APPDATA%\MelodySheet\launch.log` 看日志。
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
