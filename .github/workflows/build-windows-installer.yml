name: Build Windows installer

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      release:
        description: "Attach the .exe to a draft GitHub Release"
        required: false
        default: "false"

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          architecture: x64

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) { throw "ISCC.exe missing after install" }
          echo "ISCC_PATH=$iscc" >> $env:GITHUB_ENV

      - name: Run build pipeline
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File installer\build.ps1 -IsccPath "$env:ISCC_PATH"

      - name: Verify installer exists
        shell: pwsh
        run: |
          $exe = "installer\out\MelodySheet-Setup.exe"
          if (-not (Test-Path $exe)) { throw "Installer not produced at $exe" }
          Get-Item $exe | Format-List FullName, Length, LastWriteTime

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MelodySheet-Setup
          path: installer/out/MelodySheet-Setup.exe
          if-no-files-found: error
          retention-days: 30

      - name: Create draft release
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: installer/out/MelodySheet-Setup.exe
          name: MelodySheet Windows ${{ github.run_number }}
          body: |
            Automated Windows installer build (run #${{ github.run_number }}).

            Download `MelodySheet-Setup.exe` and double-click to install. The app
            runs locally on `http://127.0.0.1:8765/` and auto-opens your default
            browser.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
