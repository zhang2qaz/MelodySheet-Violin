name: Build macOS installer

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      release:
        description: "Attach the .dmg to a draft GitHub Release"
        required: false
        default: "false"

permissions:
  contents: write  # required for softprops/action-gh-release to create releases

jobs:
  build:
    # macos-14 is Apple Silicon (arm64). To also build for Intel Macs add a
    # matrix entry for macos-13 (last Intel runner).
    runs-on: macos-14
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Run macOS build pipeline
        run: bash installer/build_macos.sh

      - name: Verify DMG exists
        run: |
          dmg="installer/out/MelodySheet-macOS.dmg"
          if [[ ! -f "$dmg" ]]; then
            echo "ERROR: $dmg not produced"
            ls -la installer/out || true
            exit 1
          fi
          ls -lh "$dmg"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MelodySheet-macOS
          path: installer/out/MelodySheet-macOS.dmg
          if-no-files-found: error
          retention-days: 30

      - name: Publish to GitHub Release
        if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && github.event.inputs.release == 'true')
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          files: installer/out/MelodySheet-macOS.dmg
          name: MelodySheet ${{ github.ref_name }} (macOS)
          tag_name: ${{ github.ref_name }}
          body: |
            ## 小提琴旋律谱 · macOS 安装包

            下载 `MelodySheet-macOS.dmg`,双击挂载,把 MelodySheet.app 拖到
            Applications 文件夹。

            ### 首次打开

            macOS Gatekeeper 会因为应用未签名而拦截。**右键 → 打开** →
            点弹窗里的"打开"按钮即可永久授权。

            ### 国内下载加速

            如果你在中国大陆,可以加 ghproxy 镜像前缀:
            `https://ghproxy.com/<原下载链接>`

            ### 启动崩溃？
            打开终端跑 `/Applications/MelodySheet.app/Contents/MacOS/MelodySheet`,或者
            查看 `~/Library/Logs/MelodySheet/launch.log`。
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
